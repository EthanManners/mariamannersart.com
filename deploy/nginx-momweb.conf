# nginx: reverse-proxy /api/ to the Node service.
#
# The existing HTTPS server {} block for mariamannersart.com already serves the
# static site from /var/www/mariamannersart/public via:
#     root /var/www/mariamannersart/public;
#     location / { try_files $uri $uri/ =404; }
#
# Add the location block below INSIDE that same server {} (alongside `location /`),
# then: sudo nginx -t && sudo systemctl reload nginx
#
# Node serves on 127.0.0.1:8787. proxy_pass forwards the request body unmodified,
# so Stripe webhook signature verification at /api/webhook still works. The
# X-Forwarded-* headers pair with app.set("trust proxy", 1) so req.ip and the
# subscribe rate-limit see the real client IP.

location /api/ {
    proxy_pass http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
