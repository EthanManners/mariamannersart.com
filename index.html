<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Maria Manners — Artist & Illustrator based in Austin, Texas. Specializing in characters, environments, props, and surface collections using traditional and digital mediums.">
  <title>Maria Manners — Artist & Illustrator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Header ── -->
  <header id="site-header">
    <div class="header-inner">
      <div class="header-identity">
        <img src="MMArt Logo for Web3.png" alt="Maria Manners" class="header-logo">
        <span class="header-subtitle">Artist &amp; Illustrator</span>
      </div>
      <nav aria-label="Primary navigation">
        <a href="#work">Work</a>
        <a href="about/">About</a>
        <a href="about/#contact">Contact</a>
      </nav>
    </div>
  </header>

  <main>

    <!-- ── Gallery ── -->
    <section id="work" aria-label="Portfolio work">
      <div id="gallery-grid"></div>
    </section>

  </main>

  <!-- ── Footer ── -->
  <footer>
    <p>&copy; Maria Manners | Created by ethanmanners.com <span id="footer-year"></span></p>
  </footer>

  <!-- ── Lightbox ── -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" hidden>
    <div id="lb-backdrop"></div>
    <button id="lb-close" aria-label="Close lightbox">&times;</button>
    <button id="lb-prev" aria-label="Previous image">&#8592;</button>
    <div id="lb-img-wrap">
      <img id="lb-img" src="" alt="">
    </div>
    <button id="lb-next" aria-label="Next image">&#8594;</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
