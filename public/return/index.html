<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Order Status — Maria Manners</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

  <!-- ── Header ── -->
  <header id="site-header">
    <div class="header-inner">
      <div class="header-identity">
        <a href="../"><img src="../MMArt Logo for Web3.png" alt="Maria Manners" class="header-logo"></a>
        <span class="header-subtitle">Artist &amp; Illustrator</span>
      </div>
      <div class="header-right">
        <nav aria-label="Primary navigation">
          <a href="../">Shop</a>
          <a href="../portfolio/">Portfolio</a>
          <a href="../about/">About</a>
          <a href="../about/#contact">Contact</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <div class="return-wrap">
      <div class="return-card">
        <div id="return-status">
          <h1 class="return-title">Checking your payment…</h1>
          <p class="return-msg">One moment.</p>
        </div>
        <a class="return-link" href="../">Return to the shop</a>
      </div>
    </div>
  </main>

  <!-- ── Footer ── -->
  <footer>
    <p>&copy; Maria Manners | Created by ethanmanners.com <span id="footer-year"></span></p>
  </footer>

  <!-- Stripe.js + return handler (commerce page) -->
  <script src="https://js.stripe.com/v3/"></script>
  <script src="return.js"></script>
</body>
</html>
